<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipVault — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo-block">
      <div class="wordmark">Clip<span>Vault</span></div>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      <label class="field-label">
        Email
        <input type="email" id="email" placeholder="gamer@email.com" autocomplete="email">
      </label>
      <label class="field-label">
        Password
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Sign in</button>
    </form>

    <div class="auth-divider">or</div>

    <div class="platform-btns">
      <button class="btn-platform btn-xbox" id="xbox-btn">
        <span class="platform-badge xbox-badge">X</span>
        Continue with Xbox
      </button>
      <button class="btn-platform btn-steam" id="steam-btn">
        <span class="platform-badge steam-badge">S</span>
        Continue with Steam
      </button>
    </div>

    <p class="auth-footer">New here? <a href="#">Create account →</a></p>
  </div>

  <script>
    function showToast(msg) {
      const prev = document.querySelector('.toast');
      if (prev) prev.remove();
      const el = Object.assign(document.createElement('div'), {
        className: 'toast',
        textContent: msg
      });
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      window.location.href = 'feed.html';
    });

    document.getElementById('xbox-btn').addEventListener('click', () =>
      showToast('Xbox sign-in coming soon'));
    document.getElementById('steam-btn').addEventListener('click', () =>
      showToast('Steam sign-in coming soon'));
  </script>
</body>
</html>
